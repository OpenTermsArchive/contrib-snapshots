"https://frontsite-nextjs.wetransfer.net/_next/static/chunks/webpack-c8a6d88287372195.js" defer=""></script><script src="https://frontsite-nextjs.wetransfer.net/_next/static/chunks/framework-2dad2a7bcc95afcf.js" defer=""></script><script src="https://frontsite-nextjs.wetransfer.net/_next/static/chunks/main-285180385b468d06.js" defer=""></script><script src="https://frontsite-nextjs.wetransfer.net/_next/static/chunks/pages/_app-addb261e5954d055.js" defer=""></script><script src="https://frontsite-nextjs.wetransfer.net/_next/static/chunks/bd1a647f-94964554d0a1cfea.js" defer=""></script><script src="https://frontsite-nextjs.wetransfer.net/_next/static/chunks/1900-47727674b9aff7de.js" defer=""></script><script src="https://frontsite-nextjs.wetransfer.net/_next/static/chunks/4017-873bb6da4712daca.js" defer=""></script><script src="https://frontsite-nextjs.wetransfer.net/_next/static/chunks/1106-6749b341157adb19.js" defer=""></script><script src="https://frontsite-nextjs.wetransfer.net/_next/static/chunks/534-4fb73464239b572e.js" defer=""></script><script src="https://frontsite-nextjs.wetransfer.net/_next/static/chunks/pages/explore/legal/%5Bid%5D-d4cd517ae92abd6e.js" defer=""></script><script src="https://frontsite-nextjs.wetransfer.net/_next/static/frontsite-nextjs-6fc6fd4cb7/_buildManifest.js" defer=""></script><script src="https://frontsite-nextjs.wetransfer.net/_next/static/frontsite-nextjs-6fc6fd4cb7/_ssgManifest.js" defer=""></script><style data-wtstyle=""></style></head><body><div id="__next"> <div style="min-height:100vh;display:flex;flex-direction:column"><main style="flex:1"></main></div> <noscript><iframe src="https://tagging.wetransfer.com/ns.html?id=GTM-NS54WBW" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"page":{"id":"aC3qNRMAACAAbaf4","uid":"takedown","url":"/explore/legal/takedown","type":"legalPage","href":"https://wetransfer.cdn.prismic.io/api/v2/documents/search?ref=abfa4REAACAAHsra\u0026q=%5B%5B%3Ad+%3D+at%28document.id%2C+%22aC3qNRMAACAAbaf4%22%29+%5D%5D","tags":["Legal"],"first_publication_date":"2025-05-21T14:59:03+0000","last_publication_date":"2025-06-04T10:04:36+0000","slugs":["notice-and-take-down-policy"],"linked_documents":[],"lang":"en-us","alternate_languages":[],"data":{"theme":"light","slices":[{"variation":"richTextBlock","version":"initial","items":[],"primary":{"theme":"light","marginBottom":"large","body":[{"type":"heading1","text":"Notice and Take Down Policy","spans":[],"direction":"ltr"},{"type":"paragraph","text":"WeTransfer respects your rights and expects that you respect the rights of others. In the unfortunate event that WeTransfer finds or is notified of unlawful files or content being distributed through it’s Service, we will follow the procedures described in this Notice and Take Down Policy. By using our website or file transfer service, you agree to be bound by our Notice and Take Down Policy below.","spans":[],"direction":"ltr"}],"tables":[]},"id":"text_panel$aea8c5af-e9fe-4a50-866f-78ce07dd7915","slice_type":"text_panel","slice_label":null},{"variation":"default","version":"initial","items":[],"primary":{"horizontalLine":true,"marginBottom":"medium","theme":"light"},"id":"divider$d5cd277f-49dc-4fb8-aa9a-577a8617d932","slice_type":"divider","slice_label":null},{"variation":"richTextBlock","version":"initial","items":[],"primary":{"theme":"light","marginBottom":"large","body":[{"type":"heading3","text":"Code of Conduct","spans":[],"direction":"ltr"},{"type":"paragraph","text":"WeTransfer subscribes to the Dutch Notice and Take Down Code of Conduct (“Code”) of the Platform Internet Security (Platform Internetveiligheid). This Code of Conduct establishes procedures for internet intermediaries like WeTransfer to deal with reports of (alleged) unlawful content, directed at removal of disputed content (“Report” or “Reports”). This Notice and Take Down Policy (“NTD Policy”) describes the procedures and time limits WeTransfer applies in dealing with such Reports.\n\n\n\n\n\n","spans":[],"direction":"ltr"},{"type":"heading3","text":"Report requirements","spans":[],"direction":"ltr"},{"type":"paragraph","text":"Any person or organization that makes a Report (“Notifier”) has the duty to ensure that it is correct and complete. WeTransfer should be able to verify that Reports following an investigation regarding a criminal offence have originated from an inspection or investigation service, or – in the case of a formal legal order – from the Public Prosecutor’s Office. A Report of any other nature than the foregoing should include at least the following information:","spans":[],"direction":"ltr"},{"type":"list-item","text":"Notifier’s contact details, name, function, organisation, address, email address);","spans":[],"direction":"ltr"},{"type":"list-item","text":"all information WeTransfer needs in order to evaluate the lawfulness of the disputed content, including its location (URL);","spans":[],"direction":"ltr"},{"type":"list-item","text":"motivation as to the unlawfulness of the content, or why it is in conflict with WeTransfer’s Terms of Service, NTD or Privacy Policy;","spans":[],"direction":"ltr"},{"type":"list-item","text":"motivation of the reason(s) why WeTransfer is the most appropriate intermediary to deal with the matter.\n\n\n\n\n\n","spans":[],"direction":"ltr"},{"type":"heading3","text":"Indemnity","spans":[],"direction":"ltr"},{"type":"paragraph","text":"Notifier will provide WeTransfer with an explicit indemnity against 1) claims from the user who’s content is at dispute (“Content Provider”) relating to any actions WeTransfer has taken in relation to handling the Report, and 2) any claims from Notifier in relation to content send through our Service.\n\n\n\n\n\n","spans":[],"direction":"ltr"},{"type":"heading3","text":"Urgency","spans":[],"direction":"ltr"},{"type":"paragraph","text":"Notifier might request WeTransfer to deal with the report as a matter of urgency. In that case, the Report should substantiate all reasons for urgency. WeTransfer determines at its own discretion whether the report should be dealt with as a matter of urgency on the basis of the foregoing explanation.\n\n\n\n\n\n","spans":[],"direction":"ltr"},{"type":"heading3","text":"Evaluation","spans":[],"direction":"ltr"},{"type":"paragraph","text":"WeTransfer shall evaluate the Report and classify it into one of three categories:","spans":[],"direction":"ltr"},{"type":"list-item","text":"punishable content reported by an inspection or investigation service, or – in the case of a formal legal order – by the Public Prosecutor’s Office;","spans":[],"direction":"ltr"},{"type":"list-item","text":"unequivocally unlawful (onmiskenbaar onrechtmatig) content and/or punishable content reported by other sources than the authorities listed under 1); and","spans":[],"direction":"ltr"},{"type":"list-item","text":"all other content, falling neither under category 1) or 2).\n\n\n\n\n\n","spans":[],"direction":"ltr"},{"type":"heading3","text":"Measures","spans":[],"direction":"ltr"},{"type":"paragraph","text":"WeTransfer’s categorisation of the Report determines which measures are taken to address the Report.","spans":[],"direction":"ltr"},{"type":"list-item","text":". In the event that WeTransfer determines that the content concerned is unequivocally unlawful or punishable, in other words falls under the above mentioned categories 1) and 2), WeTransfer ensures that the content concerned is immediately removed;","spans":[],"direction":"ltr"},{"type":"list-item","text":"In the event that WeTransfer determines that the content concerned is not unequivocally unlawful or punishable, in other words falls under the above mentioned category 3), the content concerned shall not be removed. WeTransfer will inform Notifier accordingly;","spans":[],"direction":"ltr"},{"type":"list-item","text":"In the event that WeTransfer is not or unsufficiently able to judge whether the content concerned is unequivocally unlawful or punishable, WeTransfer will inform Content Provider about the Report with the request to (i) allow WeTransfer to remove the content or (ii) to contact Notifier. If Notifier and Content Provider are unable to reach an agreement, Notifier can make an official report to the police if a criminal offence might be concerned. If it concerns content that is alleged to be unlawful under civil law, Notifier can bring the dispute with Content Provider before a Dutch court of law. Should Content Provider be unwilling to sufficiently identify himself to Notifier, WeTransfer has the right to (i) provide Notifier with the Content Provider’s name, email address and IP-address or (ii) to remove the content concerned.\n\n\n\n\n\n","spans":[],"direction":"ltr"},{"type":"heading3","text":"Period","spans":[],"direction":"ltr"},{"type":"paragraph","text":"Categorisation and appropriate measures will preferably take place as soon as possible, yet ultimately 10 days after receiving the Report.\n\n\n\n\n\n","spans":[],"direction":"ltr"},{"type":"heading3","text":"Due caution","spans":[],"direction":"ltr"},{"type":"paragraph","text":"In the events that content is to be removed, WeTransfer shall exercise due caution to ensure that no more than the necessary content, in regards of the Report, is removed.\n\n\n\n\n\n","spans":[],"direction":"ltr"},{"type":"heading3","text":"Questions?","spans":[],"direction":"ltr"},{"type":"paragraph","text":"For questions about this NTD Policy, please contact WeTransfer by sending an email to legal@wetransfer.com. We speak English and Dutch.","spans":[{"start":86,"end":106,"type":"hyperlink","data":{"link_type":"Web","url":"mailto:legal@wetransfer.com","target":"_blank"}}],"direction":"ltr"}],"tables":[]},"id":"text_panel$0af145f1-3a89-4974-baa9-53d261e76e9c","slice_type":"text_panel","slice_label":null}],"meta_title":"WeTransfer is the simplest way to send your files around the worl  reviews|1 TB storage per person|Send and receive up to 200 GB","card1cta":"Sign up","card2title":"Premium","card2subtitle":"Share work with no limits","card2price":"€23","card2priceDesc":"monthly per person","card2features":"Unlimited portals and reviews|Unlimited storage|No size limit on transfers","card2cta":"Sign up"},"organize":{"headline":"Portals","title":"Organize your projects and clients","description":"Portals help you and your clients easily keep track of all the creative work you share—from first draft to final sign-off (and everything in between). Say goodbye to lost links and messy desktops."},"reviews":{"headline":"Reviews","title":"Feel good about feedback with reviews","description":"Put your work in portals so your clients can review with ease, making feedback something to look forward to.","item1":{"title":"Make every project punctual ","description":"No one likes final-hour feedback. Set a due date for clients to give their input and keep all your projects on schedule."},"item2":{"title":"Keep track of progress","description":"View the status of your work by tracking feedback and approvals."},"item3":{"title":"Clear communication with comments","description":"No one likes final-hour feedback. Set a due date for clients to give their input and keep all your projects on schedule."}},"clients":{"title":"Easy for clients,\u003cbr\u003eeasy for you","description":"Portals and reviews are client-friendly tools that keep everyone on the same page.","item1":{"title":"Keep everything in one place","description":"No one likes endless email threads or losing attachments. With portals, everything lives in one place, from assets to feedback and approvals."},"item2":{"title":"Save space (and sanity)","description":"Previews let clients see your work without having to download assets or software. No more missing fonts or full storage."},"item3":{"title":"Let clients know what’s needed","description":"Request actions from clients to get the type of feedback you of transfer storage space","card2subtitle":"Keep all your file transfers in one place (thanks, cloud storage)"},"security":{"subtitle":"Extra security","title":"Send large files securely","description":"Your files are secure with WeTransfer. Two-factor authentication and data encryption are always included—but with WeTransfer Pro, you get even more security. Control file access with password protection and custom link expiration.","item1title":"Data encryption","item1description":"TLS and AES-256 encryption help us securely send and store your files","item2title":"Password protection","item2description":"Set a (super secret) password so only you and your recipients can access your uploaded files","item3title":"Custom file expiration dates","item3description":"Decide how long a file transfer is available for download","item4title":"Two-factor authentication","item4description":"Add an extra layer of security to your account by connecting an authenticator app"},"quote1":{"text":"“WeTransfer Pro gives us an \u003cstrong\u003eimmaculate client-facing window\u003c/strong\u003e for our file transfers and neatly integrates our branding.”"},"branding":{"subtitle":"Custom download pages and emails","title":"Send large files like a pro","description":"Send and receive files from your custom WeTransfer page with a unique URL. You can also upload an image to the notification emails where recipients download your files—so you can impress clients from the moment you hit send.","item1title":"Create your page","item1description":"Set a custom URL and give your download page a name","item2title":"Add a background","item2description":"Upload up to five rotating images or videos to your page","item3title":"Customize transfer emails","item3description":"Add an image to transfer emails (the ones with a download link)"},"collaboration":{"subtitle":"Team collaboration","title":"Send large files,\ntogether","description":"You create together, so why not send files together? With WeTransfer Pro, your team can send files from a shared, branded WeTransfer page and manage file transfers in one place. WeTransfer is a simple, secure way to bring your team (and the files you share) together.","item1title":"1 TB of transfer storage per person","item1description":"Centralize your file transfers to access all your data from one shared space","item2title":"Shared file transfer overview","item2description":"Track download links and manage file transfers as a team","item3title":"Custom team branding","item3description":"Show off your teamwork with a branded page and download notification emails"},"quote2":{"text":"“We trust WeTransfer Pro. It’s secure, and we love that we can showcase our branding when we send files.”"},"preview":{"subtitle":"Exclusive access","title":"Get a sneak peek","description":"Be the first to try portals, a new way to organize your work and share files with clients for review. Get the feedback you need and keep it all in one place for a rock-solid workflow."},"footer":{"title":"Bigger and better file sharing","features":"200 GB file sharing,Secure file transfers,Custom branding,Team collaboration","cta":"Get Pro for just €12/month"}},"premium_upsell_page":{"header":{"title":"Get 25% off\u003cbr /\u003e Premium when\u003cbr /\u003e you upgrade now","content":"Your trial is almost over—\u003cbr /\u003edon’t miss out","button":"Upgrade to premium"},"why_premium_items":[{"subtitle":"Why premium?","title":"No size limits\u003cbr /\u003e on transfers","copy":"With Premium, you can focus on the important stuff without worrying about limits. Send as much (or little) as you want.","overlay":true},{"subtitle":"Why premium?","title":"Unlimited\u003cbr /\u003e storage","copy":"Keep everything in one place with unlimited storage. Keep your transfers in your account so you can always easily access them.","overlay":true},{"subtitle":"Why premium?","title":"Unlimited portals\u003cbr /\u003e and reviews","copy":"Organize your projects and clients. With portals and reviews, you can keep track of all the creative work you share—from first draft to final sign-off."}],"compare_plans":{"subtitle":"COMPARE PLANS","title":"Leave limits behind","content":"You’ve been enjoying a trial of WeTransfer Premium features since January. Switch to a yearly Premium plan before your trial ends on July 18, 2022 and you’ll get 25% off your first year.","plans":[{"type":"intro","title":"\u0026nbsp;","subtitle":"\u0026nbsp;","list":[{"listItem":"Transfer size limit"},{"listItem":"Storage per person"},{"listItem":"Access to portals and reviews"}]},{"type":"pro","title":"Pro","subtitle":"Features you're paying for","list":[{"listItem":"Up to 200 GB"},{"listItem":"1 TB storage per person"},{"listItem":"1 portal, unlimited reviews"}]},{"type":"premium","title":"Premium","subtitle":"Features you're trialing","list":[{"listItem":"Unlimited"},{"listItem":"Unlimited"},{"listItem":"Unlimited"}],"button":{"copy":"Upgrade now","link":"https://wetransfer.com/account/payment?from=marketing","tracking":"premium_upgrade_tiers_comparison"},"discount":"save 25%"}]},"partners":{"title":"Today’s teams\u003cbr /\u003e trust WeTransfer"},"faq":{"content":{"title":"Got questions?","text":"Let’s chat—we’re here to help you get the most out of WeTransfer Premium.","buttonCopy":"Contact us →"},"list":[{"trackingLabel":"faq_dropdown_premium_over_pro","question":"What’s Premium got on Pro?","answer":"\u003cp\u003eNever worry about limits again with our newest (and best) plan, Premium. You’ll get to enjoy:\u003c/p\u003e\u003cul\u003e\u003cli\u003eNo size limits on transfers\u003c/li\u003e\u003cli\u003eNo storage limits\u003c/li\u003e\u003cli\u003eNo portals and reviews limits\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eOn top of that, you will still have unlimited access to Paste® and Collect features.\u003c/p\u003e\u003cp\u003eOn a WeTransfer Pro plan you enjoy the same features as Premium but with set limits:\u003c/p\u003e\u003cul\u003e\u003cli\u003eSend and receive up to 200 GB of files\u003c/li\u003e\u003cli\u003e1TB of storage per person\u003c/li\u003e\u003cli\u003e1 portals, unlimited reviews\u003c/li\u003e\u003c/ul\u003e"},{"trackingLabel":"faq_dropdown_buyers_remorese_revert_to_pro","question":"What if I upgrade to Premium and then want to return to Pro?","answer":"\u003cp\u003eIt is also not currently possible to downgrade from WeTransfer Premium to WeTransfer Pro. In order to do this, you must first cancel your WeTransfer Premium subscription and then upgrade back to WeTransfer Pro from your free account after your previous subscription has expired.\u003c/p\u003e"},{"trackingLabel":"faq_dropdown_user_does_not_upgrade","question":"What happens if I don’t upgrade at all?","answer":"\u003cp\u003ePortals and reviews\u003cbr /\u003eAll your portals and reviews will still be there once you’re back on WeTransfer Pro—however, WeTransfer Pro gives you access to one portal only. So if you have more than one portal, you won’t be able to create new portals or edit them until you’ve deleted all the additional ones you’ve already made. You can keep all your portals and reviews (with limited access) in case you decide to upgrade later\u003c/p\u003e\u003cp\u003eStorage\u003cbr /\u003eOnce you’re back on WeTransfer Pro, you will only have access to 1 TB of storage (per person, if you add team members). You won’t be able to send new transfers if your storage is full, so you’ll need to delete any unwanted transfers until your storage is less than 1 TB. Again, we recommend that you download and save all your files before deleting transfers.\u003c/p\u003e"},{"trackingLabel":"faq_dropdown_team_members_tier","question":"What happens if I have added new team members during my trial?","answer":"\u003cp\u003eIf you decide to upgrade at the end of your trial, all your team members will also have WeTransfer Premium. If you don’t upgrade to WeTransfer Premium, you and your team members will be back on WeTransfer Pro.\u003c/p\u003e"},{"trackingLabel":"faq_dropdown_post_sign_up","question":"What happens after I sign up and pay?","answer":"\u003cp\u003eFireworks and party poppers. Kidding—you’ll be able to continue with WeTransfer Premium (as you were) as soon as you’ve completed your payment. We’ll also send you a confirmation email with your paid invoice attached.\u003c/p\u003e"},{"trackingLabel":"faq_dropdown_payment_methods","question":"What payment methods can I use?","answer":"\u003cp\u003eWe accept PayPal as well as credit cards by major networks such as Visa, Mastercard, and American Express. We also support other online payment systems in some countries.\u003c/p\u003e\u003cp\u003eWe don’t accept direct bank transfers because you have to sign up for a recurring yearly or monthly subscription. (We’ll email you before this happens for the first time, to give you a heads up.)\u003c/p\u003e"},{"trackingLabel":"faq_dropdown_trust_wetransfer","question":"Can I trust WeTransfer? How safe is it?","answer":"\u003cp\u003eExtremely safe. Millions of people around the world trust WeTransfer and our set of tools to share their ideas—with more than 2 billion files sent through our platform every month.\u003c/p\u003e\u003cp\u003eTo keep your ideas safe from attack or exploitation, your files are encrypted when they are transferred (TLS) and when they are stored (AES-256). Once your files are stored, they can only be accessed using the unique links sent to the sender and recipient.\u003c/p\u003e"}]},"header_bottom":{"title":"Your toolkit,\u003cbr /\u003e zero limits","button":"Upgrade to premium"}}},"webUIDictionary":{"header":{"primary":{"items":[{"title":"Features","externalLink":"/explore/all-features","tracking":{"eventLabel":"nav_features"},"items":[{"title":"All features","externalLink":"/explore/all-features","tracking":{"eventLabel":"nav_features_all"}},{"title":"For file sharing","externalLink":"/explore/file-sharing","tracking":{"eventLabel":"nav_features_file_sharing"}},{"title":"For collaboration","external
